    d.push({team:"blue",type:"attack"});
  }
  d.push({team:"red",type:"heal"});
  d.push({team:"blue",type:"heal"});
  for(let i=d.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
  return d.slice(0,5);
}
function targets(n,rad){
  const R=ring(),pad=rad*.95,min=rad*1.55,pts=[];
  for(let t=0;pts.length<n&&t<800;t++){
    let x=rand(R.x+pad,R.x+R.s-pad),y=rand(R.y+pad,R.y+R.s-pad),ok=true;
    for(const p of pts){let dx=p.x-x,dy=p.y-y;if(Math.hypot(dx,dy)<min){ok=false;break}}
    if(ok)pts.push({x,y});
  }
  while(pts.length<n)pts.push({x:rand(R.x+pad,R.x+R.s-pad),y:rand(R.y+pad,R.y+R.s-pad)});
  return pts;
}
function deal(){
  cards=[];const R=ring(),rad=Math.min(R.s*.105,36),ts=targets(5,rad),ds=deck();
  for(let i=0;i<5;i++){
    let t=ts[i];
    cards.push({team:ds[i].team,type:ds[i].type,x:t.x+rand(-60,60),y:-80-i*38-rand(0,140),tx:t.x,ty:t.y,r:rad,rot:rand(-.6,.6),spin:rand(-.035,.035),
      z:0,vz:0,tilt:0,tv:0,face:0,flip:false,settled:true,dealing:true,delay:i*.08,weight:rand(.85,1.25),bias:rand(-.35,.35)});
  }
  aim.x=R.x+R.s/2;aim.y=R.y+R.s/2;state="deal";dropper=null;impact=null;shake=0;resultT=0;msg="カード配置中……";
}
function pos(e){const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}}
function down(e){if(state!=="aim")return;let p=pos(e),R=ring();drag=true;moved=false;start=p;aim.x=clamp(p.x,R.x,R.x+R.s);aim.y=clamp(p.y,R.y,R.y+R.s)}
function move(e){if(!drag||state!=="aim")return;let p=pos(e),R=ring();if(Math.hypot(p.x-start.x,p.y-start.y)>12)moved=true;aim.x=clamp(p.x,R.x,R.x+R.s);aim.y=clamp(p.y,R.y,R.y+R.s)}
function up(){if(!drag)return;drag=false;if(!moved&&state==="aim")throwMenko()}
canvas.addEventListener("mousedown",down);window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
canvas.addEventListener("touchstart",down,{passive:false});window.addEventListener("touchmove",e=>{move(e);e.preventDefault()},{passive:false});window.addEventListener("touchend",up);
window.addEventListener("keydown",e=>{if(e.code==="Space")throwMenko();if(e.key.toLowerCase()==="r")newMatch()});

function throwMenko(){
  if(state!=="aim"||dropper)return;
  const center=1-Math.abs((phase%1)-.5)*2,power=.55+center*.75,R=ring();
  dropper={x:aim.x,y:aim.y,z:170,vz:-18-power*8,rot:rand(-.5,.5),spin:rand(-.28,.28),r:Math.min(R.s*.08,30),power,hit:false};
  state="action";msg="バシッ……";
}
function hit(x,y,power){
  const R=ring();impact={x,y,r:1,max:R.s*.55,life:1};shake=8*power;let likely=0;
  for(const c of cards){
    let dx=c.x-x,dy=c.y-y,d=Math.hypot(dx,dy),inf=clamp(1-d/(R.s*.52),0,1);if(!inf)continue;
    let edge=clamp(d/(c.r*2.2),0,1),raw=(power*inf*(.72+edge*.55))/c.weight,turns=raw*rand(1.25,2.9)+c.bias;
    c.flip=true;c.settled=false;c.z=Math.max(c.z,7+raw*35);c.vz=2.5+raw*11;c.tv=turns*Math.PI*rand(.055,.082);c.spin=rand(-.18,.18)*inf+(dx>0?.035:-.035);
    let pred=Math.abs(turns*Math.PI)%(Math.PI*2);if(pred>Math.PI*.72&&pred<Math.PI*1.38)likely++;
  }
  msg=likely?"いけるか……？":"浅い！";
}
function result(){
  let rd=0,bd=0,items=[];
  for(const c of cards){
    c.z=0;c.vz=0;c.flip=false;c.settled=true;c.tilt=c.face?Math.PI:0;c.tv=0;c.spin=0;
    if(!c.face)continue;
    if(c.type==="attack"){
      if(c.team==="red"){rd-=1;items.push("赤👊")}
      else{bd-=1;items.push("青👊")}
    }else if(c.type==="heal"){
      if(c.team==="red"){rd+=1;items.push("赤🩹")}
      else{bd+=1;items.push("青🩹")}
    }
  }
  lastR=rd;lastB=bd;
  redHP=clamp(redHP+rd,0,10);
  blueHP=clamp(blueHP+bd,0,10);
  resultT=2.45;state="result";
  msg=items.length?items.join(" / "):"めくれなし";
}
function updateDeal(){
  let done=true;
  for(const c of cards){
    if(c.delay>0){c.delay-=1/60;done=false;continue}
    if(c.dealing){
      c.x+=(c.tx-c.x)*.10;c.y+=(c.ty-c.y)*.12;c.rot+=c.spin*2;
      if(Math.hypot(c.tx-c.x,c.ty-c.y)<1.2){c.x=c.tx;c.y=c.ty;c.dealing=false;c.rot=rand(-.22,.22)}else done=false;
    }
  }
  if(done){state="aim";msg="照準を合わせて、叩く"}
}
function updateCards(){
  let moving=false;
  for(const c of cards){
    if(!c.settled)moving=true;
    if(c.flip){
      c.z+=c.vz;c.vz-=.95;c.tilt+=c.tv;c.tv*=.965;c.rot+=c.spin;c.spin*=.973;
      if(c.z<=0){c.z=0;c.vz*=-.22;c.tv*=.82;
        if(Math.abs(c.tv)<.018){c.flip=false;c.settled=true;let n=((c.tilt%(Math.PI*2))+Math.PI*2)%(Math.PI*2);c.face=(n>Math.PI*.58&&n<Math.PI*1.42)?1:0;c.tilt=c.face?Math.PI:0;c.tv=0;c.spin=0}
      }
    }
  }
  return moving;
}
function update(){
  time+=1/60;if(state==="aim")phase=(phase+.015)%1;needle.style.top=`${phase*100}%`;if(shake>0)shake*=.88;
  if(state==="deal")updateDeal();
  if(dropper){dropper.z+=dropper.vz;dropper.vz+=1.35;dropper.rot+=dropper.spin;
    if(dropper.z<=0&&!dropper.hit){dropper.z=0;dropper.hit=true;hit(dropper.x,dropper.y,dropper.power)}
    if(dropper.hit){dropper.r*=.985;if(dropper.r<10)dropper=null}
  }
  if(impact){impact.r+=(impact.max-impact.r)*.18;impact.life*=.86;if(impact.life<.035)impact=null}
  if(state==="action"){let m=updateCards();if(!m&&!dropper&&!impact)result()}
  else if(state==="result"){resultT-=1/60;if(resultT<=0){if(redHP<=0||blueHP<=0){state="gameover";msg=redHP<=0&&blueHP<=0?"DRAW":redHP<=0?"BLUE WIN":"RED WIN"}else deal()}}
}

function poly(n,r,sq=1,j=.08){let pts=[];for(let i=0;i<n;i++){let a=-Math.PI/2+i/n*Math.PI*2,rr=r*(1+(i%2?-j:j));pts.push([Math.cos(a)*rr,Math.sin(a)*rr*sq])}return pts}
function drawBackIcon(c,rr){
  ctx.save();
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillStyle="#f8f8f3";

  if(c.type==="attack"){
    // 赤は左側にいるので、右から来る拳：🤜
    // 青は右側にいるので、左から来る拳：🤛
    ctx.font=`${Math.floor(rr*.95)}px system-ui, Apple Color Emoji, Segoe UI Emoji`;
    ctx.fillText(c.team==="red"?"🤜":"🤛",0,1);
  }else if(c.type==="heal"){
    ctx.font=`${Math.floor(rr*.90)}px system-ui, Apple Color Emoji, Segoe UI Emoji`;
    ctx.fillText("🩹",0,1);
  }
  ctx.restore();
}

function drawCard(c,isDrop=false){
  let z=c.z||0,fs=isDrop?1:Math.cos(c.tilt||0),abs=Math.max(.12,Math.abs(fs));
  let back=isDrop?0:(!c.flip&&c.settled?c.face:(fs<0?1-c.face:c.face));
  ctx.save();ctx.translate(c.x,c.y-z);ctx.rotate(c.rot||0);ctx.scale(1,abs);
  ctx.lineWidth=2.2;ctx.strokeStyle="#111";ctx.fillStyle=back?(c.team==="red"?"#b00020":"#0057b8"):"#f8f8f3";
  let pts=poly(8,c.r,0.82);ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.closePath();ctx.fill();ctx.stroke();
  let rr=c.r;ctx.lineWidth=1.5;
  if(back){drawBackIcon(c,rr)}
  else{ctx.strokeStyle="#111";ctx.beginPath();ctx.moveTo(-rr*.42,-rr*.10);ctx.lineTo(-rr*.18,-rr*.38);ctx.lineTo(rr*.15,-rr*.26);ctx.lineTo(rr*.38,-rr*.06);ctx.lineTo(rr*.08,rr*.22);ctx.lineTo(-rr*.24,rr*.28);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.moveTo(-rr*.55,rr*.45);ctx.lineTo(rr*.55,rr*.45);ctx.stroke()}
  ctx.restore();
  if(z>1){ctx.save();ctx.globalAlpha=clamp(.14-z/900,.02,.14);ctx.translate(c.x,c.y);ctx.scale(1+z/280,.22+z/900);ctx.beginPath();ctx.arc(0,0,c.r*.82,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();ctx.restore()}
}
function drawTable(){let R=ring();ctx.save();ctx.lineWidth=2;ctx.strokeRect(R.x,R.y,R.s,R.s);ctx.beginPath();ctx.moveTo(R.x+10,R.y+10);ctx.lineTo(R.x+R.s-10,R.y+10);ctx.lineTo(R.x+R.s-14,R.y+R.s-12);ctx.lineTo(R.x+12,R.y+R.s-8);ctx.closePath();ctx.stroke();ctx.restore()}
function drawAim(){ctx.save();ctx.translate(aim.x,aim.y);ctx.lineWidth=2;ctx.strokeStyle="#111";let p=7+Math.sin(time*5)*2;ctx.beginPath();ctx.moveTo(-20,0);ctx.lineTo(-p,0);ctx.moveTo(p,0);ctx.lineTo(20,0);ctx.moveTo(0,-20);ctx.lineTo(0,-p);ctx.moveTo(0,p);ctx.lineTo(0,20);ctx.stroke();ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.stroke();ctx.restore()}
function drawImpact(){if(!impact)return;ctx.save();ctx.globalAlpha=impact.life;ctx.lineWidth=2;ctx.strokeStyle="#111";ctx.beginPath();ctx.arc(impact.x,impact.y,impact.r,0,Math.PI*2);ctx.stroke();for(let i=0;i<10;i++){let a=i/10*Math.PI*2+.15;ctx.beginPath();ctx.moveTo(impact.x+Math.cos(a)*impact.r*.5,impact.y+Math.sin(a)*impact.r*.5);ctx.lineTo(impact.x+Math.cos(a)*impact.r*.95,impact.y+Math.sin(a)*impact.r*.95);ctx.stroke()}ctx.restore()}
function signed(v){return v>0?`+${v}`:`${v}`}

// 集計時イラスト差し込み用の準備枠。
// 後でここに drawImage(...) を足せば、結果時の紙芝居演出を入れられる。
function drawResultIllustrationSlot(x,y){
  ctx.save();
  ctx.strokeStyle="#111";ctx.lineWidth=1.5;ctx.globalAlpha=.45;
  ctx.beginPath();ctx.moveTo(x-58,y);ctx.lineTo(x+58,y);ctx.stroke();
  ctx.restore();
}

function overlay(){
  if(state!=="result"&&state!=="gameover")return;ctx.save();
  let bw=Math.min(330,W-48),bh=state==="gameover"?82:102,x=(W-bw)/2,y=H*.12;
  ctx.fillStyle="#f8f8f3";ctx.strokeStyle="#111";ctx.lineWidth=2;ctx.fillRect(x,y,bw,bh);ctx.strokeRect(x,y,bw,bh);
  ctx.textAlign="center";ctx.fillStyle="#111";ctx.font="700 20px system-ui";
  if(state==="gameover"){
    ctx.fillText(msg,W/2,y+34);ctx.font="14px system-ui";ctx.fillText("Rで再試合",W/2,y+58)
  }else{
    drawResultIllustrationSlot(W/2,y+16);
    ctx.fillText(`RED ${signed(lastR)} / BLUE ${signed(lastB)}`,W/2,y+42);
    ctx.font="14px system-ui";ctx.fillText(msg,W/2,y+66);ctx.fillText(`RED ${redHP} / BLUE ${blueHP}`,W/2,y+86)
  }
  ctx.restore();
}
function hud(){ctx.save();ctx.font="700 18px system-ui";ctx.fillStyle="#111";ctx.fillText(VERSION,14,28);ctx.font="700 16px system-ui";ctx.fillStyle="#b00020";ctx.fillText(`RED HP ${redHP}`,14,54);ctx.fillStyle="#0057b8";ctx.fillText(`BLUE HP ${blueHP}`,130,54);ctx.fillStyle="#111";ctx.font="13px system-ui";ctx.fillText(msg,14,76);ctx.font="12px system-ui";ctx.fillText("R:再試合 / Space:叩く",14,H-14);ctx.restore()}
function render(){ctx.clearRect(0,0,W,H);ctx.save();if(shake>.2&&state!=="result"&&state!=="gameover")ctx.translate(rand(-shake,shake),rand(-shake,shake));drawTable();[...cards].sort((a,b)=>a.y-b.y).forEach(c=>drawCard(c));drawImpact();if(dropper){drawCard({x:dropper.x,y:dropper.y,z:dropper.z,rot:dropper.rot,r:dropper.r,tilt:0,face:0,team:"red"},true);ctx.save();ctx.globalAlpha=.3;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(dropper.x,dropper.y-dropper.z);ctx.lineTo(dropper.x,dropper.y);ctx.stroke();ctx.restore()}if(state==="aim"&&!dropper)drawAim();ctx.restore();hud();overlay()}
function loop(){update();render();requestAnimationFrame(loop)}
window.addEventListener("resize",resize);canvas.addEventListener("click",()=>{if(state==="gameover")newMatch()});resize();loop();
})();
</script>
</body>
</html>
